services:
  db-shard0:
    image: mariadb:10.6
    container_name: photoshare-db-shard0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: photoshare
      MYSQL_USER: photoshare_user
      MYSQL_PASSWORD: photoshare_password
    volumes:
      - db_shard0_data:/var/lib/mysql
    networks:
      - photoshare-network

  db-shard1:
    image: mariadb:10.6
    container_name: photoshare-db-shard1
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: photoshare
      MYSQL_USER: photoshare_user
      MYSQL_PASSWORD: photoshare_password
    volumes:
      - db_shard1_data:/var/lib/mysql
    networks:
      - photoshare-network

  redis:
    image: redis:7-alpine
    container_name: photoshare-redis
    networks:
      - photoshare-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: photoshare-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "15672:15672"
    networks:
      - photoshare-network

  # US Data Center
  us-app1:
    build: .
    container_name: photoshare-us-app1
    environment:
      DB_SHARD0_HOST: db-shard0
      DB_SHARD1_HOST: db-shard1
      DB_USER: photoshare_user
      DB_PASSWORD: photoshare_password
      DB_NAME: photoshare
      SESSION_SECRET: "xK9mL2pQ8vN4rW7zJ1yU6tA3sF0gH5d"
      PORT: 3000
      REGION: us-east
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://admin:password@rabbitmq:5672
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - db-shard0
      - db-shard1
    networks:
      - photoshare-network

  us-app2:
    build: .
    container_name: photoshare-us-app2
    environment:
      DB_SHARD0_HOST: db-shard0
      DB_SHARD1_HOST: db-shard1
      DB_USER: photoshare_user
      DB_PASSWORD: photoshare_password
      DB_NAME: photoshare
      SESSION_SECRET: "xK9mL2pQ8vN4rW7zJ1yU6tA3sF0gH5d"
      PORT: 3001
      REGION: us-east
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://admin:password@rabbitmq:5672
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - db-shard0
      - db-shard1
    networks:
      - photoshare-network

  # EU Data Center
  eu-app1:
    build: .
    container_name: photoshare-eu-app1
    environment:
      DB_SHARD0_HOST: db-shard0
      DB_SHARD1_HOST: db-shard1
      DB_USER: photoshare_user
      DB_PASSWORD: photoshare_password
      DB_NAME: photoshare
      SESSION_SECRET: "xK9mL2pQ8vN4rW7zJ1yU6tA3sF0gH5d"
      PORT: 3002
      REGION: eu-west
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://admin:password@rabbitmq:5672
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - db-shard0
      - db-shard1
    networks:
      - photoshare-network

  eu-app2:
    build: .
    container_name: photoshare-eu-app2
    environment:
      DB_SHARD0_HOST: db-shard0
      DB_SHARD1_HOST: db-shard1
      DB_USER: photoshare_user
      DB_PASSWORD: photoshare_password
      DB_NAME: photoshare
      SESSION_SECRET: "xK9mL2pQ8vN4rW7zJ1yU6tA3sF0gH5d"
      PORT: 3003
      REGION: eu-west
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://admin:password@rabbitmq:5672
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - db-shard0
      - db-shard1
    networks:
      - photoshare-network

  # US NGINX
  us-nginx:
    image: nginx:alpine
    container_name: photoshare-us-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx-us.conf:/etc/nginx/nginx.conf
      - uploads_data:/app/uploads
    depends_on:
      - us-app1
      - us-app2
    networks:
      - photoshare-network

  # EU NGINX
  eu-nginx:
    image: nginx:alpine
    container_name: photoshare-eu-nginx
    ports:
      - "8081:80"
    volumes:
      - ./nginx-eu.conf:/etc/nginx/nginx.conf
      - uploads_data:/app/uploads
    depends_on:
      - eu-app1
      - eu-app2
    networks:
      - photoshare-network

  worker:
    build: .
    container_name: photoshare-worker
    command: node worker.js
    environment:
      RABBITMQ_URL: amqp://admin:password@rabbitmq:5672
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - rabbitmq
    networks:
      - photoshare-network

networks:
  photoshare-network:
    driver: bridge

volumes:
  db_shard0_data:
  db_shard1_data:
  uploads_data: