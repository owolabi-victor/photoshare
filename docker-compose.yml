services:
  db-master:
    image: mariadb:10.6
    container_name: photoshare-db-master
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: photoshare
      MYSQL_USER: photoshare_user
      MYSQL_PASSWORD: photoshare_password
    volumes:
      - db_master_data:/var/lib/mysql
      - ./mysql-config/master.cnf:/etc/mysql/conf.d/master.cnf
    networks:
      - photoshare-network

  db-slave:
    image: mariadb:10.6
    container_name: photoshare-db-slave
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: photoshare
      MYSQL_USER: photoshare_user
      MYSQL_PASSWORD: photoshare_password
    volumes:
      - db_slave_data:/var/lib/mysql
      - ./mysql-config/slave.cnf:/etc/mysql/conf.d/slave.cnf
    depends_on:
      - db-master
    networks:
      - photoshare-network
  redis:
    image: redis:7-alpine
    container_name: photoshare-redis
    networks:
      - photoshare-network
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: photoshare-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "15672:15672"
    networks:
      - photoshare-network
  worker:
    build: .
    container_name: photoshare-worker
    command: node worker.js
    environment:
      RABBITMQ_URL: amqp://admin:password@rabbitmq:5672
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - rabbitmq
    networks:
      - photoshare-network
  app1:
    build: .
    container_name: photoshare-app1
    environment:
      DB_MASTER_HOST: db-master
      DB_SLAVE_HOST: db-slave
      DB_MASTER_PORT: 3306
      DB_SLAVE_PORT: 3306
      DB_USER: photoshare_user
      DB_PASSWORD: photoshare_password
      DB_NAME: photoshare
      SESSION_SECRET: "xK9mL2pQ8vN4rW7zJ1yU6tA3sF0gH5d"
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://admin:password@rabbitmq:5672
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - db-master
      - db-slave
    networks:
      - photoshare-network

  app2:
    build: .
    container_name: photoshare-app2
    environment:
      DB_MASTER_HOST: db-master
      DB_SLAVE_HOST: db-slave
      DB_MASTER_PORT: 3306
      DB_SLAVE_PORT: 3306
      DB_USER: photoshare_user
      DB_PASSWORD: photoshare_password
      DB_NAME: photoshare
      SESSION_SECRET: "xK9mL2pQ8vN4rW7zJ1yU6tA3sF0gH5d"
      PORT: 3001
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://admin:password@rabbitmq:5672
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - db-master
      - db-slave
    networks:
      - photoshare-network

  nginx:
    image: nginx:alpine
    container_name: photoshare-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - uploads_data:/app/uploads
    depends_on:
      - app1
      - app2
    networks:
      - photoshare-network

networks:
  photoshare-network:
    driver: bridge

volumes:
  db_master_data:
  db_slave_data:
  uploads_data: