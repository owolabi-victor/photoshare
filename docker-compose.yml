services:
  db-shard0:
    image: mariadb:10.6
    container_name: photoshare-db-shard0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: photoshare
      MYSQL_USER: photoshare_user
      MYSQL_PASSWORD: photoshare_password
    volumes:
      - db_shard0_data:/var/lib/mysql
    networks:
      - photoshare-network

  db-shard1:
    image: mariadb:10.6
    container_name: photoshare-db-shard1
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: photoshare
      MYSQL_USER: photoshare_user
      MYSQL_PASSWORD: photoshare_password
    volumes:
      - db_shard1_data:/var/lib/mysql
    networks:
      - photoshare-network

  redis:
    image: redis:7-alpine
    container_name: photoshare-redis
    networks:
      - photoshare-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: photoshare-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "15672:15672"
    networks:
      - photoshare-network

  app1:
    build: .
    container_name: photoshare-app1
    environment:
      DB_SHARD0_HOST: db-shard0
      DB_SHARD1_HOST: db-shard1
      DB_USER: photoshare_user
      DB_PASSWORD: photoshare_password
      DB_NAME: photoshare
      SESSION_SECRET: "xK9mL2pQ8vN4rW7zJ1yU6tA3sF0gH5d"
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://admin:password@rabbitmq:5672
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - db-shard0
      - db-shard1
    networks:
      - photoshare-network

  app2:
    build: .
    container_name: photoshare-app2
    environment:
      DB_SHARD0_HOST: db-shard0
      DB_SHARD1_HOST: db-shard1
      DB_USER: photoshare_user
      DB_PASSWORD: photoshare_password
      DB_NAME: photoshare
      SESSION_SECRET: "xK9mL2pQ8vN4rW7zJ1yU6tA3sF0gH5d"
      PORT: 3001
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://admin:password@rabbitmq:5672
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - db-shard0
      - db-shard1
    networks:
      - photoshare-network

  worker:
    build: .
    container_name: photoshare-worker
    command: node worker.js
    environment:
      RABBITMQ_URL: amqp://admin:password@rabbitmq:5672
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - rabbitmq
    networks:
      - photoshare-network

  nginx:
    image: nginx:alpine
    container_name: photoshare-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - uploads_data:/app/uploads
    depends_on:
      - app1
      - app2
    networks:
      - photoshare-network

networks:
  photoshare-network:
    driver: bridge

volumes:
  db_shard0_data:
  db_shard1_data:
  uploads_data: